# Netlify Configuration for Rubato Sound Works

[build]
  # Directory with the build output
  publish = "output"

  # Build command
  command = "pip install -r requirements.txt && pelican content -s publishconf.py"

[build.environment]
  # Python version
  PYTHON_VERSION = "3.11"

# Redirect rules (optional)
[[redirects]]
  from = "/home"
  to = "/"
  status = 301

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/theme/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/theme/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
